apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {app: webapp}
  template:
    metadata:
      labels: {app: webapp, version: v1.0.0}
    spec:
      containers:
        - name: webapp
          image: webapp-prod:v1.0.0
          imagePullPolicy: Never    # image locale Minikube
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "300m", memory: "256Mi"}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
  namespace: production
spec:
  type: NodePort
  selector: {app: webapp}
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080